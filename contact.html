<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Koleksi Antik Tok Wan</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Koleksi Antik Tok Wan</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="product.html">Product</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm border-0 bg-light">
                    <h3 class="mb-4 text-center fw-bold">Hubungi Kami</h3>
                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nama Penuh:</label>
                            <input type="text" class="form-control" placeholder="Masukkan nama..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email:</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mesej:</label>
                            <textarea class="form-control" rows="4" placeholder="Apa yang ingin ditanyakan?" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 fw-bold py-2">HANTAR PESANAN</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 Koleksi Antik Tok Wan. All Rights Reserved</p>
    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
